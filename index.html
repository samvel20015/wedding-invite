<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ռոման և Վարդուհի</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    font-family: "Segoe UI", sans-serif;
    height: 100%;
    overflow-x: hidden;
}

/* 🌈 Background */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(-45deg, #fdfcfb, #e2d1c3, #f8e8dc, #fdfcfb);
    background-size: 400% 400%;
    animation: gradientMove 12s ease infinite;
    z-index: -2;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Card */
.card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255,255,255,0.9);
    padding: 25px;
    border-radius: 25px;
    width: 90%;
    max-width: 380px;
    text-align: center;
}

/* Title */
.title {
    color: #c8a97e;
}

.heart {
    color: red;
}

/* Countdown */
.countdown {
    font-size: 18px;
    font-weight: bold;
    color: #c8a97e;
}

/* Button */
.btn {
    margin-top: 15px;
    padding: 12px;
    width: 100%;
    border: none;
    border-radius: 25px;
    background: linear-gradient(45deg, #c8a97e, #e2c9a0);
    color: white;
    cursor: pointer;
}

/* Details */
.details {
    margin-top: 15px;
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    transition: 0.5s;
}

.details.show {
    max-height: 200px;
    opacity: 1;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="card">

    <h1 class="title">
        Ռոման <span class="heart">❤</span> Վարդուհի
    </h1>

    <div class="guest" id="guestName"></div>

    <p>Սիրով հրավիրում ենք Ձեզ 💍</p>

    <div class="date">📅 26 Ապրիլ, 2026</div>

    <div class="countdown" id="countdown">Բեռնվում է...</div>

    <button class="btn" onclick="showDetails()">Բացել հրավերը ✨</button>

    <div id="details" class="details">
        <p>⛪ 15:00 — Հառիճավանք</p>
        <p>🎉 18:00 — Արթիկի հանդիսությունների սրահ</p>
    </div>

</div>

<script>
// Guest (պարզ տարբերակ)
document.getElementById("guestName").innerText = "Հարգելի հյուր";

// Countdown
const countdownEl = document.getElementById("countdown");
const targetDate = new Date(2026, 3, 26).getTime();

setInterval(() => {
    const now = new Date().getTime();
    const distance = targetDate - now;

    if (distance <= 0) {
        countdownEl.innerHTML = "Հարսանիքը սկսվեց 🎉";
        return;
    }

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((distance / (1000 * 60)) % 60);
    const seconds = Math.floor((distance / 1000) % 60);

    countdownEl.innerHTML =
        days + " օր " +
        hours + " ժամ " +
        minutes + " րոպե " +
        seconds + " վայրկյան";

}, 1000);

// Show details
function showDetails() {
    document.getElementById("details").classList.toggle("show");
}
</script>

</body>
</html>
